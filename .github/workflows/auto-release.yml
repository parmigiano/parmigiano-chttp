name: Auto Release Tag

on:
  push:
    branches: [main, master]

permissions:
  contents: write
  packages: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        uses: paulhatch/semantic-version@v5.4.0
        id: version
        with:
          tag_prefix: v
          major_pattern: "BREAKING CHANGE|:!"
          minor_pattern: "^feat(\\(.+\\))?!?:"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false
          search_commit_body: true

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version_tag }}"
          git push origin "${{ steps.version.outputs.version_tag }}"

  release:
    needs: tag
    if: needs.tag.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.version_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.tag.outputs.version_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.tag.outputs.version_tag }}
            type=raw,value=latest

      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version_tag }}
          name: parmigiano-chttp ${{ needs.tag.outputs.version_tag }}
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/parmigiano/parmigiano-chttp:${{ needs.tag.outputs.version_tag }}
            docker run --rm -p 8080:8080 --env-file .env ghcr.io/parmigiano/parmigiano-chttp:${{ needs.tag.outputs.version_tag }}
            ```

            ## Compose

            See [docker-compose.prod.yml](https://github.com/parmigiano/parmigiano-chttp/blob/main/docker-compose.prod.yml) for the full production stack.
