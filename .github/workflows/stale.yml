name: Stale

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark and close stale items
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            had no activity for 60 days. It will be closed in 14 days if no
            further activity occurs. Please comment or reopen if this is still
            relevant.
          stale-pr-message: >
            This pull request has been automatically marked as stale because
            it has had no activity for 30 days. It will be closed in 14 days
            if no further activity occurs.
          close-issue-message: >
            This issue was closed automatically due to inactivity. Feel free
            to reopen if needed.
          close-pr-message: >
            This pull request was closed automatically due to inactivity.
          days-before-stale: 60
          days-before-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,bug
          exempt-pr-labels: pinned,security,work-in-progress
