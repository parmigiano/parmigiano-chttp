# Runs when a tag is pushed manually (local: git push origin v0.3.0).
# Tags created by Auto Release Tag do NOT trigger this workflow (GitHub limitation).
# Use "Run workflow" below to publish an existing tag without re-pushing it.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.3.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.release.outputs.tag }}
            type=raw,value=latest

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: parmigiano-chttp ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/parmigiano/parmigiano-chttp:${{ steps.release.outputs.tag }}
            docker run --rm -p 8080:8080 --env-file .env ghcr.io/parmigiano/parmigiano-chttp:${{ steps.release.outputs.tag }}
            ```

            ## Compose

            See [docker-compose.prod.yml](https://github.com/parmigiano/parmigiano-chttp/blob/main/docker-compose.prod.yml) for the full production stack.
