name: PR Docker Build

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  docker-build:
    name: Docker build (PR)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: parmigiano-chttp:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update PR with build status
        if: success()
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const markerStart = '<!-- parmigiano-chttp-docker -->';
            const markerEnd = '<!-- /parmigiano-chttp-docker -->';
            const runId = process.env.RUN_ID;
            const prNumber = process.env.PR_NUMBER;
            const { owner, repo } = context.repo;
            const fullRepo = `${owner}/${repo}`;
            const runUrl = `https://github.com/${fullRepo}/actions/runs/${runId}`;

            const section = [
              markerStart,
              '## Docker build (PR)',
              '',
              '> Auto-generated on every push. Validates that the Dockerfile builds successfully.',
              '',
              '| | |',
              '|---|---|',
              `| **PR** | #${prNumber} |`,
              `| **Workflow run** | [${runId}](${runUrl}) |`,
              `| **Status** | passed |`,
              '',
              '### Local test',
              '',
              '```bash',
              'docker compose -f docker-compose.dev.yml up --build',
              '```',
              markerEnd,
            ].join('\n');

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: Number(prNumber),
            });

            let body = pr.body ?? '';
            const startIdx = body.indexOf(markerStart);
            const endIdx = body.indexOf(markerEnd);

            if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
              body = body.slice(0, startIdx) + section + body.slice(endIdx + markerEnd.length);
            } else {
              body = body.trimEnd() + '\n\n' + section;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: Number(prNumber),
              body,
            });
