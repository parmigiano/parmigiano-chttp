name: Bug report
description: Report a bug or unexpected behavior in the HTTP server
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Docker (docker-compose)
        - Local build (make lin)
        - Production
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Server version
      description: Tag, image tag, or commit hash (e.g. v0.3.0)
      placeholder: v0.3.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: HTTP request, endpoint, payload, or docker-compose steps.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / additional context
      description: Server logs, HTTP response samples, Redis/Postgres errors, etc.
      render: shell
